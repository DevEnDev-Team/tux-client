app-id: org.devendev.TuxIt
runtime: org.kde.Platform
runtime-version: '6.10'
sdk: org.kde.Sdk
command: tux-it
finish-args:
  - --socket=x11
  - --socket=wayland
  - --device=dri
  - --share=ipc
  - --share=network
modules:
  - name: tux-it
    buildsystem: cmake
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
    sources:
      - type: git
        url: https://github.com/DevEnDev-Team/tux-client.git
        tag: v1.0.0

